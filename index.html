<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fce3ec, #e0f7fa);
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #ff6b81;
    }

    p {
      color: #555;
      line-height: 1.6;
      font-size: 16px;
    }

    .heart {
      font-size: 30px;
      margin: 20px 0;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hey Love 💕</h1>
    
    <p>
      I know things feel heavy right now…  
      and I wish I could take that weight away from you.
    </p>

    <p>
      But I want you to know this —  
      you are deeply loved, always.  
      Even on your hardest days.
    </p>

    <div class="heart">❤️</div>

    <p id="hiddenMessage" style="display:none;">
      I'm here for you, no matter what.  
      You're not alone in this. Ever.
    </p>

    <button onclick="showMessage()">Click me</button>
  </div>

  <script>
    function showMessage() {
      document.getElementById("hiddenMessage").style.display = "block";
    }
  </script>

</body>
</html>
